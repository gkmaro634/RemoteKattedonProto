name: remote_kattedon
description: "待ち時間をゲームで活用する海鮮丼注文アプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^11.0.0
  provider: ^6.0.0
  url_launcher: ^6.2.0
  flutter_riverpod: ^2.4.0
  audioplayers: ^5.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/deshelling_crab/
    - assets/images/genge/
    - assets/images/bora/
    - assets/images/icons/
    - assets/data/
    - assets/audio/deshelling_crab/
    - assets/audio/genge/

  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700
